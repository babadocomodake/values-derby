# push（main）するたびに、ビルドして GitHub Pages へ自動公開するワークフロー。
# ＝CLAUDE.mdでいう「CI（pushで自動テスト＆公開）」の実体。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可

# Pages公開に必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 公開は同時に1つだけ（古い実行は取り消す）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:run # テストが通らなければ公開しない
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
